name: citapps
description: "Aplicación móvil para administración de barberías"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # Functional Programming
  dartz: ^0.10.1

  # Charts
  fl_chart: ^0.68.0

  # Forms & Validation
  reactive_forms: ^17.0.0

  # Date/Time
  intl: ^0.19.0
  table_calendar: ^3.1.0

  # Storage & Cache
  shared_preferences: ^2.2.0

  # Utils
  uuid: ^4.3.0
  equatable: ^2.0.5
  url_launcher: ^6.2.0

  # PDF
  pdf: ^3.10.0
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  mockito: ^5.4.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
